<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React Lesson 2 - E-commerce</title>
  
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
    .product-container { display: flex; gap: 20px; flex-wrap: wrap; }
    .product-card { 
      background: white; 
      padding: 15px; 
      border-radius: 8px; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
      width: 200px;
    }
    .product-card img { width: 100%; border-radius: 4px; }
    .price-original { color: #555; }
    .price-discount { color: red; font-weight: bold; }
    button { 
      background: #ffd814; border: 1px solid #fcd200; 
      border-radius: 20px; padding: 5px 15px; cursor: pointer; 
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
   
    function ProductDetails(props) {
      const { name, price, discountPrice, imageSrc } = props;

      return (
        <div className="product-card">
         
          <img src={`https://supersimple.dev/images/${imageSrc}`} alt={name} />
          
          <h3>{name}</h3>

          <p className="price-original">
            Price: {discountPrice ? <del>${price}</del> : `$${price}`}
          </p>

          {discountPrice && (
            <p className="price-discount">Discount price: ${discountPrice}</p>
          )}

          <button>Add to Cart</button>
        </div>
      );
    }

    function App() {
      return (
        <div className="product-container">

          <ProductDetails 
            name="Cotton socks" 
            price="10.90" 
            discountPrice="5.45" 
            imageSrc="cotton-socks.png" 
          />
          
          <ProductDetails 
            name="Tennis balls" 
            price="6.00" 
            imageSrc="tennis-balls.png" 
          />
          
          <ProductDetails 
            name="Plain T-Shirt" 
            price="7.99" 
            imageSrc="plain-t-shirt.png" 
          />
        </div>
      );
    }

    // Render the App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
